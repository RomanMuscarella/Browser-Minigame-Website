                <!-- Success Modal -->
        <div class="modal fade"
             id="successModal"
             tabindex="-1"
             aria-labelledby="successModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title" id="successModalLabel">Success</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="successMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade"
             id="infoModal"
             tabindex="-1"
             aria-labelledby="infoModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title" id="infoModalLabel">How to play</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="infoMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Error Modal -->
        <div class="modal fade"
             id="errorModal"
             tabindex="-1"
             aria-labelledby="errorModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title" id="errorModalLabel">Error</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="errorMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        {% block script%}
        {% endblock script %}
        <script type="module">
        import { getCurrentUser} from '/static/js/auth.js';

        // Update navbar based on auth state
        async function updateAuthUI() {
            const user = await getCurrentUser();
            const loggedInNav = document.getElementById('loggedInTopBar');
            const loggedOutNav = document.getElementById('loggedOutTopBar');
            const accountBtn = document.getElementById('accountBtn');

            if (user) {
            loggedInNav.classList.remove('d-none');
            loggedInNav.classList.add('d-flex');
            loggedOutNav.classList.add('d-none');
            accountBtn.textContent = user.username;
            } else {
            loggedInNav.classList.add('d-none');
            loggedInNav.classList.remove('d-flex');
            loggedOutNav.classList.remove('d-none');
            accountBtn.textContent = 'Account';
            }
        }

        // Update UI on page load
        updateAuthUI();
        </script>
    </body>
</html>
