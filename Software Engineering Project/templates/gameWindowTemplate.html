{% extends "layout.html" %}
    {% block content %}
        <div id="window">
            <h1>{{ game.title }}</h1>
            <button type="button" id="theButton">Hello</button>
            <h3 id="score">Score: {{ score.val }} Set by: </h3>
        </div>
    {% endblock content %}
    {% block script %}
        {% if game.title == 'Tic-Tac-Toe' %}
            <script src=" {{ url_for('static', path='js/script2.js') }} "></script>
        {% endif %}
    {% endblock script %}
